targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name:  {{routeName}}

{{#payloadLoggerEnabled}}
lua:
  - type: Inline
    inline: |
      function envoy_on_request(request_handle)
        request_handle:streamInfo():dynamicMetadata():set("digitalhub", "project", "{{projectName}}")
        request_handle:streamInfo():dynamicMetadata():set("digitalhub", "service_name", "{{serviceId}}")
        request_handle:streamInfo():dynamicMetadata():set("digitalhub", "function_name", "{{functionName}}")
      end
{{/payloadLoggerEnabled}}

extProc:
{{#payloadLoggerEnabled}}
  - backendRefs:
      - name: {{payloadLoggerHost}}
        port: {{payloadLoggerPort}}
    metadata:
      accessibleNamespaces: 
        - digitalhub
    failOpen: true
    processingMode:
      request: 
        body: Streamed
      response: 
        body: Streamed
{{/payloadLoggerEnabled}}
{{#extProcs}}
  - backendRefs:
      - name: {{extProcHost}}
        port: {{extProcPort}}
    processingMode:
      request: 
        body: Buffered
      response: 
        body: Buffered
    failOpen: true
{{/extProcs}}