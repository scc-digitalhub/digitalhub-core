# Credentials
credentials:
  provider:
    s3:
      enable: ${S3_CREDENTIALS_PROVIDER:false}
      endpoint: ${S3_ENDPOINT_URL:}
      bucket: ${S3_BUCKET:}
      signature-version: ${S3_SIGNATURE_VERSION:s3v4}
      region: ${AWS_DEFAULT_REGION:us-east-1}
      path-style-access: ${S3_PATH_STYLE_ACCESS:true}
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}
      claim: ${S3_CREDENTIALS_CLAIM_PREFIX:}
      policy: ${S3_CREDENTIALS_POLICY:}
      roleArn: ${S3_CREDENTIALS_ROLE_ARN:}
      duration: ${S3_CREDENTIALS_DURATION:3600}
