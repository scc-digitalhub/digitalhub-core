providers:
  loki:
    url: ${LOKI_URL:false}
    org-id: ${LOKI_ORG_ID:}
    username: ${LOKI_USERNAME:}
    password: ${LOKI_PASSWORD:}
    namespace: ${LOKI_NAMESPACE:}
    map-with-prefix: ${LOKI_MAP_WITH_PREFIX:true}
    mapping:
      run: ${LOKI_MAPPING_RUN:instance}
      project: ${LOKI_MAPPING_PROJECT:component}
      user: ${LOKI_MAPPING_USER:}
      namespace: ${LOKI_MAPPING_NAMESPACE:namespace}
