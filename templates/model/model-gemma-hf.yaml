kind: huggingface
metadata:
  name: gemma-4
  description: Gemma is a family of open models built by Google DeepMind. Gemma 4
    models are multimodal, handling text and image input (with audio supported
    on small models) and generating text output. This release includes
    open-weights models in both pre-trained and instruction-tuned variants.
    Gemma 4 features a context window of up to 256K tokens and maintains
    multilingual support in over 140 languages. 
  labels: ["Gemma", "Gemma4", "Multimodal", "License: Apache-2.0"]
